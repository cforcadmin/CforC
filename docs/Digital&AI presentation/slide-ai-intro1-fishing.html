<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>AI? — Εισαγωγή</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --coral: #FF8B6A;
      --coral-light: #FFB299;
      --coral-dark: #FF6B47;
      --charcoal: #2D2D2D;
      --charcoal-light: #4A4A4A;
      --white: #FFFFFF;
      --gray-50: #F9FAFB;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
    }

    body {
      font-family: 'Inter', 'Arial Nova', Arial, system-ui, sans-serif;
      background: var(--white);
      color: var(--charcoal);
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      position: relative;
    }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--coral-dark), var(--coral), var(--coral-light));
    }

    .deco-logo {
      position: absolute;
      bottom: -180px;
      right: -120px;
      width: 650px;
      height: 650px;
      opacity: 0.07;
    }

    /* ─── Full center layout ─── */
    .slide {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    .content {
      display: flex;
      align-items: center;
      gap: 100px;
    }

    /* ─── Fisherman illustration ─── */
    .illustration {
      width: 600px;
      height: 600px;
      position: relative;
    }

    /* Water */
    .water {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(180deg, rgba(100,181,246,0.15), rgba(100,181,246,0.3));
      border-radius: 0 0 20px 20px;
    }

    .water-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(100,181,246,0.4);
    }

    /* Person */
    .person {
      position: absolute;
      bottom: 160px;
      left: 140px;
    }

    /* Head */
    .head {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--charcoal);
      margin: 0 auto 0;
    }

    /* Body */
    .body-shape {
      width: 80px;
      height: 120px;
      background: var(--coral);
      border-radius: 16px 16px 0 0;
      margin: -5px auto 0;
    }

    /* Legs */
    .legs {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .leg {
      width: 16px;
      height: 80px;
      background: var(--charcoal);
      border-radius: 0 0 6px 6px;
    }

    /* Fishing rod */
    .rod {
      position: absolute;
      bottom: 280px;
      left: 210px;
      width: 3px;
      height: 200px;
      background: var(--charcoal-light);
      transform: rotate(-30deg);
      transform-origin: bottom left;
    }

    .rod-line {
      position: absolute;
      top: 0;
      left: 1px;
      width: 1px;
      height: 320px;
      background: var(--gray-400);
      transform: rotate(30deg);
      transform-origin: top left;
    }

    /* Fish / data hook */
    .hook {
      position: absolute;
      bottom: 80px;
      left: 350px;
      font-size: 48px;
    }

    .data-bits {
      position: absolute;
      bottom: 30px;
      left: 280px;
      display: flex;
      gap: 20px;
    }

    .data-bit {
      font-size: 14px;
      font-weight: 600;
      color: rgba(100,181,246,0.6);
      font-family: monospace;
    }

    /* ─── Title side ─── */
    .title-side {
      text-align: left;
    }

    .ai-question {
      font-size: 220px;
      font-weight: 900;
      color: var(--charcoal);
      line-height: 0.9;
      letter-spacing: -8px;
    }

    .ai-question span {
      color: var(--coral-dark);
    }

    .subtitle {
      font-size: 36px;
      font-weight: 300;
      color: var(--gray-400);
      margin-top: 20px;
      letter-spacing: 2px;
    }

    .badge {
      display: inline-block;
      margin-top: 40px;
      background: var(--charcoal);
      color: var(--white);
      padding: 14px 32px;
      border-radius: 28px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .badge .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--coral);
      margin-right: 10px;
    }

    .footer {
      position: absolute;
      bottom: 30px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--gray-200);
    }
    .footer-text { font-size: 15px; color: var(--gray-400); }
    .footer-url { font-size: 15px; color: var(--coral); font-weight: 500; }
  </style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="slide">
    <div class="content">

      <!-- Fisherman illustration -->
      <div class="illustration">
        <div class="person">
          <div class="head"></div>
          <div class="body-shape"></div>
          <div class="legs">
            <div class="leg"></div>
            <div class="leg"></div>
          </div>
        </div>
        <div class="rod">
          <div class="rod-line"></div>
        </div>
        <div class="hook">🎣</div>
        <div class="water">
          <div class="water-line"></div>
          <div class="data-bits">
            <span class="data-bit">01101</span>
            <span class="data-bit">data</span>
            <span class="data-bit">10010</span>
            <span class="data-bit">info</span>
            <span class="data-bit">01110</span>
          </div>
        </div>
      </div>

      <!-- Title -->
      <div class="title-side">
        <div class="ai-question">AI<span>?</span></div>
        <div class="subtitle">Τεχνητή Νοημοσύνη</div>
        <div class="badge"><span class="dot"></span>Ομάδα Ψηφιακός Μετασχηματισμός & AI</div>
      </div>

    </div>
  </div>

  <div class="footer">
    <span class="footer-text">Culture for Change · 2026</span>
    <span class="footer-url">cultureforchange.net</span>
  </div>

  <div class="deco-logo">
    <svg viewBox="0 0 62 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M28.1357 56.9941C29.2174 57.1347 30.3196 57.2174 31.4101 57.245L31.8545 41.4423C31.3662 41.4313 30.8838 41.3927 30.4102 41.332L28.1357 56.9941Z" fill="#FF8B6A"/><path d="M19.7527 33.0938L3.91309 38.2786C4.27268 39.2572 4.69659 40.2247 5.16728 41.1591L20.2994 34.3562C20.0918 33.9482 19.9106 33.5265 19.7527 33.0938Z" fill="#FF8B6A"/><path d="M2.41992 26.0625L19.0928 27.6971C19.1425 27.2395 19.2214 26.7902 19.3237 26.3492L2.94323 22.9863C2.70935 23.9979 2.53394 25.0316 2.41992 26.0598V26.0625Z" fill="#FF8B6A"/><path d="M19.0487 29.752L2.31445 30.6947C2.37877 31.72 2.50448 32.751 2.68574 33.7626L19.2153 31.1136C19.1335 30.6671 19.0779 30.215 19.0487 29.7547V29.752Z" fill="#FF8B6A"/><path d="M23.8526 38.627L13.2197 50.8435C14.0617 51.4968 14.9534 52.1115 15.8684 52.6738L25.0249 39.4346C24.6185 39.1838 24.2268 38.9164 23.8526 38.627Z" fill="#FF8B6A"/><path d="M26.936 40.4062L20.2061 54.8831C21.2117 55.2993 22.2525 55.6659 23.3021 55.9746L28.2896 40.8859C27.8247 40.7508 27.3745 40.5882 26.9331 40.4062H26.936Z" fill="#FF8B6A"/><path d="M21.3978 36.127L7.65723 45.1846C8.28286 46.0281 8.96404 46.8467 9.68323 47.6213L22.2924 37.2047C21.9737 36.8629 21.6755 36.5046 21.3978 36.1297V36.127Z" fill="#FF8B6A"/>
    </svg>
  </div>
</body>
</html>
