<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>AI — Το Μαύρο Κουτί</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --coral: #FF8B6A;
      --coral-light: #FFB299;
      --coral-dark: #FF6B47;
      --charcoal: #2D2D2D;
      --charcoal-light: #4A4A4A;
      --white: #FFFFFF;
      --gray-50: #F9FAFB;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
    }

    body {
      font-family: 'Inter', 'Arial Nova', Arial, system-ui, sans-serif;
      background: var(--white);
      color: var(--charcoal);
      width: 1920px;
      height: 880px;
      overflow: hidden;
      position: relative;
    }

    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 6px;
      background: linear-gradient(90deg, var(--coral-dark), var(--coral), var(--coral-light));
    }

    .slide {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 50px 100px 40px;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 60px;
    }

    .title {
      font-size: 52px;
      font-weight: 700;
      color: var(--charcoal);
      letter-spacing: -0.5px;
    }
    .title span { color: var(--coral-dark); }

    .org-badge {
      display: flex; align-items: center; gap: 10px;
      background: var(--charcoal); color: var(--white);
      padding: 12px 26px; border-radius: 24px;
      font-size: 16px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    }
    .org-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--coral); }

    /* ─── Black box diagram ─── */
    .diagram {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex: 1;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--gray-200);
      margin-top: auto;
    }
    .footer-text { font-size: 15px; color: var(--gray-400); }
    .footer-url { font-size: 15px; color: var(--coral); font-weight: 500; }
  </style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="slide">

    <div class="header">
      <h1 class="title">Γιατί είναι σημαντικό το  <span>AI</span>;</h1>
      <div class="org-badge"><div class="org-dot"></div>Ομάδα Ψηφιακός Μετασχηματισμός & AI</div>
    </div>

    <div class="diagram">

      <img src="slide-ai-intro3-why-is-it-important.jpeg" alt="Digital Face" style="position:absolute; left:500px; top:200px; width:50%; object-fit:cover; border-radius: 25px;">

    </div>

    <div class="footer">
      <span class="footer-text">Culture for Change · 2026</span>
      <span class="footer-url">cultureforchange.net</span>
    </div>

  </div>
</body>
</html>
