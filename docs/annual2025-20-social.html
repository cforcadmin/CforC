<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Ετήσια Δράση 2025 — Social Media</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Arial Nova', Arial, system-ui, sans-serif;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      position: relative;
      background: #2D2D2D;
    }

    .left-strip {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 120px;
      background: #FF8B6A;
      z-index: 2;
    }
    .strip-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      font-size: 13px; font-weight: 800; color: #2D2D2D;
      letter-spacing: 6px; text-transform: uppercase; white-space: nowrap;
    }

    .logo { position: absolute; top: 36px; left: 36px; z-index: 5; }
    .logo svg { width: 48px; height: 48px; }

    .super-label {
      position: absolute; top: 50px; right: 100px;
      font-size: 13px; font-weight: 700; color: #FF8B6A;
      letter-spacing: 5px; text-transform: uppercase; z-index: 5;
    }

    .title-block { position: absolute; top: 50px; left: 200px; z-index: 5; }
    .title-main {
      font-size: 56px; font-weight: 900; color: #FFFFFF;
      text-transform: uppercase; letter-spacing: 3px;
    }
    .title-accent {
      display: inline-block; background: #FF8B6A; color: #2D2D2D;
      padding: 4px 22px; border-radius: 8px; font-size: 56px;
      font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin-top: 6px;
    }

    .divider-h {
      position: absolute; top: 220px; left: 200px; right: 100px; height: 2px;
      background: linear-gradient(90deg, #FF8B6A, rgba(255,139,106,0.1)); z-index: 5;
    }

    /* ─── 3 platform columns ─── */
    .platforms {
      position: absolute;
      top: 250px;
      left: 200px;
      right: 100px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      z-index: 5;
    }

    .platform {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
    }

    /* Platform-specific accent colors */
    .platform.fb { border-top: 4px solid #1877F2; }
    .platform.ig { border-top: 4px solid #E4405F; }
    .platform.li { border-top: 4px solid #0A66C2; }

    .platform-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .platform-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .platform-icon.fb-icon { background: #1877F2; }
    .platform-icon.ig-icon { background: linear-gradient(45deg, #F58529, #DD2A7B, #8134AF); }
    .platform-icon.li-icon { background: #0A66C2; }

    .platform-icon svg { width: 28px; height: 28px; fill: #FFFFFF; }

    .platform-name {
      font-size: 24px;
      font-weight: 900;
      color: #FFFFFF;
    }

    /* ─── Metric rows ─── */
    .metrics {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .metric {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
    }

    .metric-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .metric-value {
      font-size: 28px;
      font-weight: 900;
      color: #FFFFFF;
    }

    /* ─── Growth badge ─── */
    .growth {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 8px;
      margin-left: 8px;
    }

    .growth.up { background: rgba(76,175,80,0.15); color: #66BB6A; }
    .growth.down { background: rgba(239,83,80,0.15); color: #EF5350; }

    /* ─── Comparison section header ─── */
    .compare-label {
      font-size: 9px;
      font-weight: 800;
      color: rgba(255,255,255,0.25);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 20px;
      margin-bottom: 12px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .compare-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .compare-type {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
    }

    /* ─── FB Group banner ─── */
    .fb-group {
      position: absolute;
      bottom: 50px;
      left: 200px;
      right: 100px;
      background: rgba(24,119,242,0.08);
      border: 1px solid rgba(24,119,242,0.2);
      border-radius: 16px;
      padding: 22px 36px;
      display: flex;
      align-items: center;
      gap: 24px;
      z-index: 5;
    }

    .fb-group-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #1877F2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .fb-group-icon svg { width: 24px; height: 24px; fill: #FFFFFF; }

    .fb-group-text {
      font-size: 20px;
      font-weight: 700;
      color: #FFFFFF;
    }

    .fb-group-text strong {
      color: #64B5F6;
      font-weight: 900;
    }

    .corner { position: absolute; width: 60px; height: 60px; z-index: 3; }
    .corner-tr { top: 30px; right: 30px; border-top: 3px solid rgba(255,139,106,0.15); border-right: 3px solid rgba(255,139,106,0.15); }
    .corner-bl { bottom: 30px; left: 140px; border-bottom: 3px solid rgba(255,139,106,0.15); border-left: 3px solid rgba(255,139,106,0.15); }

    .accent-line {
      position: absolute; bottom: 0; left: 0; right: 0; height: 6px;
      background: linear-gradient(90deg, #FF6B47, #FF8B6A, #FFB299); z-index: 10;
    }
    .slide-number {
      position: absolute; bottom: 24px; right: 50px;
      font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.2);
      letter-spacing: 1px; z-index: 20;
    }
  </style>
</head>

  <div class="super-label">Ετήσια Δραστηριότητα 2025</div>

  <div class="title-block">
    <div class="title-main">SOCIAL</div>
    <div class="title-accent">MEDIA</div>
  </div>

  <div class="divider-h"></div>

  <!-- 3 Platform cards -->
  <div class="platforms">
